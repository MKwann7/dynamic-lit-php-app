worker_processes 1;
error_log stderr warn;
pid /run/nginx.pid;

load_module /usr/lib/nginx/modules/ndk_http_module.so;
load_module /usr/lib/nginx/modules/ngx_http_lua_module.so;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Define custom log format to include reponse times
    log_format main_timed '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for" '
                          '$request_time $upstream_response_time $pipe $upstream_cache_status';

    access_log /dev/stdout main_timed;
    error_log /dev/stderr notice;

    keepalive_timeout 65;

    # Write temporary files to /tmp so they can be created as a non-privileged user
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp_path;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Timeout variables
    proxy_connect_timeout       600;
    proxy_send_timeout          600;
    proxy_read_timeout          600;
    send_timeout                600;

    client_header_timeout 3000;
    client_body_timeout 3000;
    fastcgi_read_timeout 3000;
    client_max_body_size 32m;
    fastcgi_buffers 8 128k;
    fastcgi_buffer_size 128k;

    upstream goapp {
        server localhost:9000;
    }

    server {
        listen 8080 default_server;
        listen 4443 ssl;

        server_name _;
        charset utf-8;

        add_header 'X-Host' $host;
        ssl_certificate      /app/ssl/dynlit.docker.crt;
        ssl_certificate_key  /app/ssl/dynlit.docker.key;

        ssl_certificate_by_lua_block {
            local ssl = require "ngx.ssl"
            local io = require "io"

            local function file_exists(path)
                local file = io.open(path, "r")
                if file then
                    file:close()
                    return true
                else
                    return false
                end
            end

            local host = ssl.server_name()
            if not host then
                -- Default to a specific domain or handle the error
                host = "maxr.docker"
            end
            local ssl_cert = "/app/ssl/" .. host .. ".crt"
            local ssl_key = "/app/ssl/" .. host .. ".key"

            if not file_exists(ssl_cert) then
                -- Extract the root domain
                local root_domain = host:match("([^.]+%.[^.]+)$")
                if root_domain then
                    ssl_cert = "/app/ssl/" .. root_domain .. ".crt"
                    ssl_key = "/app/ssl/" .. root_domain .. ".key"
                    if not file_exists(ssl_cert) then
                        -- Use default certificate
                        ssl_cert = "/app/ssl/dynlit.docker.crt"
                        ssl_key = "/app/ssl/dynlit.docker.key"
                    end
                else
                    -- Use default certificate
                    ssl_cert = "/app/ssl/dynlit.docker.crt"
                    ssl_key = "/app/ssl/dynlit.docker.key"
                end
            end

            -- Read the certificate file
            local f_cert, err = io.open(ssl_cert, "r")
            if not f_cert then
                ngx.log(ngx.ERR, "Failed to open certificate file: ", ssl_cert, " Error: ", err)
                return
            end
            local pem_cert = f_cert:read("*a")
            f_cert:close()
            if not pem_cert then
                ngx.log(ngx.ERR, "Failed to read certificate file: ", ssl_cert)
                return
            end

            -- Read the private key file
            local f_key, err = io.open(ssl_key, "r")
            if not f_key then
                ngx.log(ngx.ERR, "Failed to open private key file: ", ssl_key, " Error: ", err)
                return
            end
            local pem_key = f_key:read("*a")
            f_key:close()
            if not pem_key then
                ngx.log(ngx.ERR, "Failed to read private key file: ", ssl_key)
                return
            end

            -- Parse the PEM-formatted certificate and key into DER format
            local der_cert, err = ssl.parse_pem_cert(pem_cert)
            if not der_cert then
                ngx.log(ngx.ERR, "Failed to parse PEM certificate: ", err)
                return
            end

            local der_key, err = ssl.parse_pem_priv_key(pem_key)
            if not der_key then
                ngx.log(ngx.ERR, "Failed to parse PEM private key: ", err)
                return
            end

            -- Set the certificate and key
            local ok, err = ssl.set_cert(der_cert)
            if not ok then
                ngx.log(ngx.ERR, "Failed to set SSL certificate: ", err)
                return
            end

            local ok, err = ssl.set_priv_key(der_key)
            if not ok then
                ngx.log(ngx.ERR, "Failed to set SSL private key: ", err)
                return
            end
        }

        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        location / {
            proxy_pass http://goapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;  # Disable buffering for potentially large file uploads
        }
    }
}