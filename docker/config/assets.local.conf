server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    sendfile on;
    tcp_nopush on;
    etag on;

    location / {
        try_files $uri $uri/ =404;
    }

    location /assets/ {
        access_log off;
        try_files $uri =404;

        expires 1h;
        add_header Cache-Control "dist, max-age=3600";
    }

    types {
        text/html html;
        text/css css;
        application/javascript js mjs;
        application/json json;
        image/svg+xml svg;
        application/wasm wasm;
        font/woff2 woff2;
        font/woff woff;
        image/png png;
        image/jpeg jpg jpeg;
        image/webp webp;
        image/gif gif;
        text/plain map txt;
    }
}